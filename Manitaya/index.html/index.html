<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Seviyorum ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Playfair+Display:ital@1&display=swap');

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #4a0404; /* Bordo Arka Plan */
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #heartContainer {
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .heart {
            background-color: #ffffff;
            height: 100px;
            width: 100px;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
        }

        .heart::after, .heart::before {
            content: "";
            background-color: #ffffff;
            border-radius: 50%;
            height: 100px;
            width: 100px;
            position: absolute;
        }

        .heart::before { top: -50px; left: 0; }
        .heart::after { left: 50px; top: 0; }

        /* Yazıyı biraz daha yukarı aldım (top: 40% yaptık) */
        .label {
            position: absolute;
            color: #4a0404;
            z-index: 15;
            font-weight: 600;
            text-align: center;
            width: 150px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.2;
            top: 40%; 
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
        }

        #finalContent {
            display: none;
            text-align: center;
            z-index: 20;
            animation: elegantIn 1.2s ease forwards;
        }

        #finalMessage {
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-style: italic;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        .couple-photo {
            max-width: 80vw;
            max-height: 50vh;
            border-radius: 15px;
            border: 6px solid white;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            display: block;
            margin: 0 auto;
        }

        @keyframes elegantIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="heartContainer">
        <div class="heart"></div>
        <p class="label">Sevgiyi büyütmek için tıkla!</p>
    </div>

    <div id="finalContent">
        <h1 id="finalMessage">Seni özledim umarım sende beni özlemişsindir eheheheh muah ❤️✨</h1>
        <!-- onerror ekleyerek hatayı yakalıyoruz -->
        <img src="biz.jpg" alt="Biz" class="couple-photo" id="mainPhoto" onerror="handleImageError()">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const heartContainer = document.getElementById('heartContainer');
        const finalContent = document.getElementById('finalContent');
        let scale = 1;
        let clicks = 0;

        // Fotoğraf yüklenemezse çalışacak hata kontrolü
        function handleImageError() {
            console.error("Fotoğraf yüklenemedi! Lütfen dosya adının 'biz.jpg' olduğundan ve HTML ile aynı klasörde durduğundan emin ol.");
            // Eğer hata verirse, görsel yerine bir uyarı kutusu çıkaralım
            // alert("Fotoğraf dosyası bulunamadı. Lütfen klasördeki fotoğraf adını kontrol et.");
        }

        heartContainer.addEventListener('click', () => {
            clicks++;
            scale += 0.3; 
            heartContainer.style.transform = `scale(${scale})`;

            if (clicks >= 8) {
                heartContainer.style.transition = "all 0.4s ease";
                heartContainer.style.opacity = "0";
                heartContainer.style.transform = "scale(3)";
                
                setTimeout(() => {
                    heartContainer.style.display = 'none';
                    finalContent.style.display = 'block';
                    launchConfetti();
                }, 400);
            }
        });

        function launchConfetti() {
            var end = Date.now() + (4 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ffffff', '#ff4d6d'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffffff', '#ff4d6d'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
